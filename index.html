<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T.A.L.K.E.R. - Дискета</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            3% { opacity: 0.7; }
            6% { opacity: 1; }
            7% { opacity: 0.9; }
            10% { opacity: 1; }
            50% { opacity: 1; }
            53% { opacity: 0.6; }
            56% { opacity: 1; }
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 100px; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-1px, 1px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }

        @keyframes hitEffect {
            0% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes screamReveal {
            0% { opacity: 0; transform: scale(0.5); }
            10% { opacity: 1; transform: scale(1.1); }
            20% { transform: scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: scale(1); }
        }

        @keyframes codeRain {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(0deg, 
                    rgba(0, 255, 65, 0.03) 0px, 
                    rgba(0, 255, 65, 0.03) 2px, 
                    transparent 2px, 
                    transparent 4px
                );
            pointer-events: none;
            z-index: 9999;
            animation: scanline 0.1s linear infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 9998;
            animation: flicker 4s infinite;
        }

        .monitor {
            background: #000;
            border: 3px solid #00ff41;
            border-radius: 8px;
            padding: 30px;
            max-width: 1100px;
            width: 100%;
            min-height: 650px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1), inset 0 0 30px rgba(0, 255, 65, 0.05);
            z-index: 1;
        }

        .monitor::before {
            content: '◥';
            position: absolute;
            top: 8px;
            left: 12px;
            color: #00ff41;
            font-size: 12px;
            opacity: 0.5;
        }

        .monitor::after {
            content: '◣';
            position: absolute;
            bottom: 8px;
            right: 12px;
            color: #00ff41;
            font-size: 12px;
            opacity: 0.5;
        }

        .screen-content {
            position: relative;
            min-height: 550px;
        }

        .console-line {
            color: #00ff41;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .console-line .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff41;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        .glitch-text {
            animation: glitch 0.1s infinite;
            display: inline-block;
        }

        .game-container {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #00ff41;
            border-radius: 4px;
            background: rgba(0, 255, 65, 0.03);
        }

        .game-container.active {
            display: block;
        }

        .game-title {
            color: #00ff41;
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 10px;
        }

        /* ===== ОХОТА ===== */
        .hunting-field {
            position: relative;
            width: 100%;
            height: 420px;
            background: radial-gradient(ellipse at center, #0a1a0a 0%, #000 100%);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 4px;
            overflow: hidden;
            cursor: crosshair;
            margin: 10px 0;
        }

        .hunting-field .crosshair {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            font-size: 30px;
            color: #00ff41;
            opacity: 0.5;
            transform: translate(-50%, -50%);
            display: none;
        }

        .mutant {
            position: absolute;
            font-size: 48px;
            cursor: crosshair;
            animation: float 2s ease-in-out infinite;
            transition: all 0.1s;
            z-index: 10;
            pointer-events: auto;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            user-select: none;
        }

        .mutant:hover {
            transform: scale(1.1);
        }

        .mutant.hit {
            animation: hitEffect 0.3s forwards;
            pointer-events: none;
        }

        .mutant .mutant-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #00ff41;
            opacity: 0.3;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .shot-effect {
            position: absolute;
            pointer-events: none;
            z-index: 50;
            color: #00ff41;
            font-size: 40px;
            opacity: 0;
            transform: translate(-50%, -50%);
        }

        .shot-effect.active {
            animation: hitEffect 0.2s forwards;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .game-header .stat {
            font-size: 14px;
            opacity: 0.8;
        }

        .game-header .stat span {
            font-weight: bold;
            font-size: 20px;
            opacity: 1;
        }

        .game-header .stat .value {
            color: #00ff41;
        }

        .game-header .stat .value.danger {
            color: #ff0040;
            animation: blink 0.5s infinite;
        }

        /* ===== СУДОКУ ===== */
        .sudoku-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .sudoku-section {
            flex: 0 0 auto;
        }

        .puzzle-section {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 15px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 4px;
            background: rgba(0, 255, 65, 0.03);
            min-width: 160px;
        }

        .simon-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 150px;
            height: 100px;
            margin: 5px 0;
        }

        .simon-cell {
            background: rgba(0, 255, 65, 0.1);
            border: 2px solid rgba(0, 255, 65, 0.3);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: rgba(0, 255, 65, 0.2);
            user-select: none;
        }

        .simon-cell:hover:not(.disabled) {
            border-color: #00ff41;
            background: rgba(0, 255, 65, 0.15);
        }

        .simon-cell.active {
            background: #00ff41;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
            border-color: #00ff41;
            transform: scale(0.95);
        }

        .simon-cell.wrong {
            background: #ff0040;
            box-shadow: 0 0 30px rgba(255, 0, 64, 0.5);
            border-color: #ff0040;
        }

        .simon-cell.center {
            background: rgba(0, 255, 65, 0.2);
            border-color: #00ff41;
            color: #00ff41;
            font-size: 24px;
            cursor: pointer;
        }

        .simon-cell.center:hover {
            background: rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        }

        .simon-cell.center.active {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.6);
        }

        .simon-cell.disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .puzzle-password-input {
            display: none;
            width: 100%;
            max-width: 150px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            padding: 5px 10px;
            outline: none;
            text-align: center;
            margin-top: 5px;
        }

        .puzzle-password-input.show {
            display: block;
        }

        .puzzle-password-input:focus {
            border-bottom-color: #00ff41;
            box-shadow: 0 2px 20px rgba(0, 255, 65, 0.1);
        }

        .puzzle-password-input:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-bottom-color: #333;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 2px;
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }

        .sudoku-cell {
            aspect-ratio: 1;
            background: #0a1a0a;
            border: 1px solid #00ff41;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #00ff41;
            cursor: pointer;
        }

        .sudoku-cell.fixed {
            color: #00ff41;
            font-weight: bold;
        }

        .sudoku-cell input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #00ff41;
            font-size: 18px;
            text-align: center;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        .sudoku-cell input:focus {
            background: rgba(0, 255, 65, 0.1);
        }

        .sudoku-cell.highlight {
            background: rgba(0, 255, 65, 0.1);
        }

        .sudoku-cell.skipped {
            background: rgba(0, 255, 65, 0.2);
            border-color: #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .sudoku-title-hover {
            position: relative;
            display: inline-block;
            cursor: help;
        }

        .sudoku-title-hover .tooltip {
            visibility: hidden;
            width: 250px;
            background: #000;
            color: #00ff41;
            text-align: center;
            border: 2px solid #00ff41;
            border-radius: 4px;
            padding: 10px;
            position: absolute;
            z-index: 10;
            bottom: 130%;
            left: 50%;
            margin-left: -125px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 14px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .sudoku-title-hover:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* ===== КНОПКИ ===== */
        .btn {
            background: transparent;
            color: #00ff41;
            border: 2px solid #00ff41;
            padding: 12px 30px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px;
        }

        .btn:hover:not(:disabled) {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .input-field {
            background: transparent;
            border: none;
            border-bottom: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            padding: 8px 12px;
            outline: none;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
            display: block;
            text-align: center;
        }

        .input-field:focus {
            border-bottom-color: #00ff41;
            box-shadow: 0 2px 20px rgba(0, 255, 65, 0.1);
        }

        .input-field:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-bottom-color: #333;
        }

        .message {
            color: #00ff41;
            text-align: center;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #00ff41;
            border-radius: 4px;
            background: rgba(0, 255, 65, 0.05);
        }

        .message.error {
            color: #ff0040;
            border-color: #ff0040;
            background: rgba(255, 0, 64, 0.05);
        }

        .message.success {
            color: #00ff41;
            border-color: #00ff41;
            background: rgba(0, 255, 65, 0.1);
        }

        .message.gameover {
            color: #ff6600;
            border-color: #ff6600;
            background: rgba(255, 102, 0, 0.1);
        }

        .progress {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .progress-step {
            width: 40px;
            height: 40px;
            border: 2px solid #00ff41;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            opacity: 0.3;
            transition: all 0.5s;
        }

        .progress-step.done {
            opacity: 1;
            background: #00ff41;
            color: #000;
        }

        .progress-step.active {
            opacity: 1;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }

        .attempt-counter {
            text-align: center;
            color: #00ff41;
            font-size: 14px;
            margin: 10px 0;
            opacity: 0.7;
        }

        .attempt-counter span {
            font-weight: bold;
            font-size: 18px;
        }

        .question-block {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 4px;
        }

        .question-block .q-text {
            color: #00ff41;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .question-block .q-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            padding: 8px 12px;
            outline: none;
            width: 100%;
            max-width: 280px;
            display: block;
        }

        .question-block .q-input:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            border-bottom-color: #333;
        }

        .question-block .q-input:focus:not(:disabled) {
            border-bottom-color: #00ff41;
            box-shadow: 0 2px 20px rgba(0, 255, 65, 0.1);
        }

        .question-block.locked {
            opacity: 0.4;
        }

        .question-block.locked .q-input {
            opacity: 0.2;
            cursor: not-allowed;
            border-bottom-color: #333;
        }

        .question-block .q-status {
            color: #00ff41;
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .question-block .q-status.done {
            color: #00ff41;
            opacity: 1;
        }

        .screamer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 99999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: screamReveal 3s forwards;
        }

        .screamer-overlay.active {
            display: flex;
        }

        .screamer-overlay .screamer-text {
            color: #ff0000;
            font-size: 64px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            text-shadow: 0 0 50px #ff0000, 0 0 100px #ff0000, 0 0 200px #ff0000;
            animation: glitch 0.05s infinite;
            padding: 20px;
            letter-spacing: 8px;
        }

        .screamer-overlay .screamer-sub {
            color: #ff3333;
            font-size: 24px;
            margin-top: 30px;
            opacity: 0.8;
            animation: blink 0.5s infinite;
        }

        .screamer-overlay .code-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .screamer-overlay .code-rain span {
            position: absolute;
            color: #00ff41;
            font-size: 14px;
            opacity: 0.3;
            white-space: nowrap;
            animation: codeRain linear infinite;
        }

        /* ===== ДИАЛОГ (ФИНАЛЬНАЯ НАГРАДА) ===== */
        .dialog-screen {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .dialog-screen.active {
            display: block;
        }

        .dialog-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 20px;
            min-height: 400px;
        }

        .portrait-container {
            flex: 0 0 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid #00ff41;
            padding: 15px 10px 10px 10px;
            background: rgba(0, 255, 65, 0.02);
            border-radius: 4px;
        }

        .portrait-frame {
            width: 100%;
            max-width: 250px;
            aspect-ratio: 1 / 1;
            background: #000;
            border: 2px solid #00ff41;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 255, 65, 0.05);
        }

        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .portrait-frame .scanline-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0, 0, 0, 0.1) 2px, rgba(0, 0, 0, 0.1) 3px);
            pointer-events: none;
            z-index: 5;
        }

        .portrait-frame .vignette {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.6) 100%);
            pointer-events: none;
            z-index: 4;
        }

        .portrait-name {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00ff41;
            opacity: 0.7;
            text-align: center;
            line-height: 1.6;
            border-top: 1px solid rgba(0, 255, 65, 0.2);
            padding-top: 8px;
            width: 100%;
        }

        .portrait-name .highlight {
            color: #00ff41;
            opacity: 1;
            font-weight: bold;
        }

        .text-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-width: 250px;
        }

        .dialog-text {
            background: rgba(0, 255, 65, 0.02);
            border: 1px solid #00ff41;
            padding: 25px 30px;
            min-height: 260px;
            max-height: 400px;
            overflow-y: auto;
            position: relative;
            line-height: 2.0;
            font-size: 26px;
            color: #00ff41;
            letter-spacing: 1px;
            border-radius: 2px;
        }

        .dialog-text .text-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .dialog-text .text-content .char {
            opacity: 0;
            animation: fadeIn 0.05s forwards;
        }

        .dialog-text .cursor-blink {
            display: inline-block;
            width: 10px;
            height: 15px;
            background: #00ff41;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        .dialog-text .cursor-blink.hidden {
            display: none;
        }

        .page-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .page-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0a1a0a;
            border: 1px solid #00ff41;
            opacity: 0.3;
            transition: all 0.3s;
        }

        .page-dot.active {
            background: #00ff41;
            opacity: 1;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        .page-dot.done {
            background: #00ff41;
            opacity: 0.5;
        }

        .dialog-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            .monitor {
                padding: 15px;
            }
            .console-line {
                font-size: 13px;
            }
            .sudoku-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .puzzle-section {
                width: 100%;
                max-width: 300px;
            }
            .sudoku-grid {
                max-width: 320px;
            }
            .sudoku-cell {
                font-size: 14px;
            }
            .sudoku-cell input {

    audio.play();

        // ========================================
        // ===== ЗВУКИ ДЛЯ ОХОТЫ =====
        // ========================================
        class SoundEngine {
            constructor() {
                this.ctx = null;
                this.enabled = true;
                try {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    this.enabled = false;
                }
            }

            resume() {
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            playShoot() {
                if (!this.enabled || !this.ctx) return;
                try {
                    this.resume();
                    const now = this.ctx.currentTime;

                    const bufferSize = this.ctx.sampleRate * 0.05;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
                    }

                    const noise = this.ctx.createBufferSource();
                    noise.buffer = buffer;

                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);

                    noise.connect(gain);
                    gain.connect(this.ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.05);

                    const osc = this.ctx.createOscillator();
                    const oscGain = this.ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.04);
                    oscGain.gain.setValueAtTime(0.15, now);
                    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                    osc.connect(oscGain);
                    oscGain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.04);

                    const osc2 = this.ctx.createOscillator();
                    const osc2Gain = this.ctx.createGain();
                    osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(2000, now);
                    osc2.frequency.exponentialRampToValueAtTime(300, now + 0.03);
                    osc2Gain.gain.setValueAtTime(0.05, now);
                    osc2Gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                    osc2.connect(osc2Gain);
                    osc2Gain.connect(this.ctx.destination);
                    osc2.start(now);
                    osc2.stop(now + 0.03);

                } catch (e) {}
            }

            playHit() {
                if (!this.enabled || !this.ctx) return;
                try {
                    this.resume();
                    const now = this.ctx.currentTime;

                    const bufferSize = this.ctx.sampleRate * 0.08;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.5)) * 0.7;
                    }

                    const noise = this.ctx.createBufferSource();
                    noise.buffer = buffer;

                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);

                    noise.connect(gain);
                    gain.connect(this.ctx.destination);
                    noise.start(now);
                    noise.stop(now + 0.08);

                    const osc = this.ctx.createOscillator();
                    const oscGain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.06);
                    oscGain.gain.setValueAtTime(0.2, now);
                    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                    osc.connect(oscGain);
                    oscGain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.06);

                } catch (e) {}
            }

            playMiss() {
                if (!this.enabled || !this.ctx) return;
                try {
                    this.resume();
                    const now = this.ctx.currentTime;

                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.06);
                    gain.gain.setValueAtTime(0.04, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.06);

                } catch (e) {}
            }

            playGameOver(win) {
                if (!this.enabled || !this.ctx) return;
                try {
                    this.resume();
                    const now = this.ctx.currentTime;

                    if (win) {
                        const notes = [523, 587, 659, 784, 880];
                        notes.forEach((freq, i) => {
                            const osc = this.ctx.createOscillator();
                            const gain = this.ctx.createGain();
                            osc.type = 'square';
                            osc.frequency.setValueAtTime(freq, now + i * 0.1);
                            gain.gain.setValueAtTime(0.06, now + i * 0.1);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.15);
                            osc.connect(gain);
                            gain.connect(this.ctx.destination);
                            osc.start(now + i * 0.1);
                            osc.stop(now + i * 0.1 + 0.15);
                        });
                    } else {
                        const notes = [440, 370, 330, 294];
                        notes.forEach((freq, i) => {
                            const osc = this.ctx.createOscillator();
                            const gain = this.ctx.createGain();
                            osc.type = 'sawtooth';
                            osc.frequency.setValueAtTime(freq, now + i * 0.15);
                            gain.gain.setValueAtTime(0.04, now + i * 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.2);
                            osc.connect(gain);
                            gain.connect(this.ctx.destination);
                            osc.start(now + i * 0.15);
                            osc.stop(now + i * 0.15 + 0.2);
                        });
                    }
                } catch (e) {}
            }
        }

            const totalPages = DIALOG_PAGES.length;
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('span');
                dot.className = 'page-dot';
                dot.dataset.index = i;
                container.appendChild(dot);
            }
            updateDialogIndicators();
        }

        function showDialogPage(index) {
            const totalPages = DIALOG_PAGES.length;
            if (index < 0 || index >= totalPages) return;

            dialogState.currentPage = index;
            updateDialogIndicators();

            const content = document.getElementById('textContent');
            content.innerHTML = '';
            const cursor = document.getElementById('cursorBlink');
            cursor.classList.remove('hidden');

            document.getElementById('nextBtn').disabled = true;
            document.getElementById('prevBtn').disabled = true;

            speech.playSpeech();

            const fullText = DIALOG_PAGES[index].text;
            typeDialogText(content, fullText, cursor);
        }

        function typeDialogText(container, text, cursor) {
            dialogState.isTyping = true;
            dialogState.isSkipped = false;
            let charIndex = 0;
            const chars = text.split('');

            if (dialogState.typeTimeout) {
                clearTimeout(dialogState.typeTimeout);
                dialogState.typeTimeout = null;
            }

            function typeChar() {
                if (dialogState.isSkipped) {
                    container.innerHTML = '';
                    const span = document.createElement('span');
                    span.textContent = text;
                    container.appendChild(span);
                    cursor.classList.add('hidden');
                    dialogState.isTyping = false;
                    document.getElementById('nextBtn').disabled = false;
                    document.getElementById('prevBtn').disabled = false;
                    return;
                }

                if (charIndex >= chars.length) {
                    cursor.classList.add('hidden');
                    dialogState.isTyping = false;
                    document.getElementById('nextBtn').disabled = false;
                    document.getElementById('prevBtn').disabled = false;
                    return;
                }

                const char = chars[charIndex];
                const span = document.createElement('span');
                span.className = 'char';
                span.textContent = char;
                container.appendChild(span);

                charIndex++;
                const delay = 15 + Math.random() * 25;
                dialogState.typeTimeout = setTimeout(typeChar, delay);
            }

            typeChar();
        }

        function skipDialogTyping() {
            if (dialogState.isTyping) {
                dialogState.isSkipped = true;
                if (dialogState.typeTimeout) {
                    clearTimeout(dialogState.typeTimeout);
                    dialogState.typeTimeout = null;
                }
            }
        }

        function nextDialogPage() {
            const totalPages = DIALOG_PAGES.length;
            if (dialogState.isTyping) {
                skipDialogTyping();
                const checkSkip = setInterval(() => {
                    if (!dialogState.isTyping) {
                        clearInterval(checkSkip);
                        if (dialogState.currentPage < totalPages - 1) {
                            showDialogPage(dialogState.currentPage + 1);
                        }
                    }
                }, 50);
                return;
            }

            if (dialogState.currentPage < totalPages - 1) {
                showDialogPage(dialogState.currentPage + 1);
            } else {
                document.getElementById('nextBtn').textContent = 'ЗАВЕРШИТЬ';
                document.getElementById('nextBtn').disabled = true;
                document.getElementById('prevBtn').disabled = true;
                document.getElementById('nextBtn').innerHTML = '✅ ЗАВЕРШЕНО';
            }
        }

        function prevDialogPage() {
            if (dialogState.isTyping) return;
            if (dialogState.currentPage > 0) {
                showDialogPage(dialogState.currentPage - 1);
            }
        }

        function updateDialogIndicators() {
            const dots = document.querySelectorAll('.page-dot');
            dots.forEach((dot, index) => {
                dot.className = 'page-dot';
                if (index === dialogState.currentPage) {
                    dot.classList.add('active');
                } else if (index < dialogState.currentPage) {
                    dot.classList.add('done');
                }
            });
        }

        function startHunt() {

            hunt.isGameOver = false;

            if (hunt.timerInterval) clearInterval(hunt.timerInterval);

            hunt.timerInterval = setInterval(() => {
                hunt.timeLeft--;

                const timerEl = document.getElementById('huntTimer');
                if (hunt.timeLeft <= 5) {
                    timerEl.className = 'value danger';
                } else {
                    timerEl.className = 'value';

                if (hunt.timeLeft <= 0) {
                    endHunt(false);

            }, 1000);

            hunt.spawnInterval = setInterval(() => {
                if (hunt.isPlaying && !hunt.isGameOver) {
                    spawnMutant();
                }
            }, CONFIG.MUTANT_SPAWN_INTERVAL);

            setTimeout(() => spawnMutant(), 200);
            setTimeout(() => spawnMutant(), 500);
            setTimeout(() => spawnMutant(), 900);

            setupHuntEvents();
        }

        function setupHuntEvents() {
            const field = document.getElementById('huntingField');
            const crosshair = document.getElementById('crosshair');

            const newField = field.cloneNode(true);
            field.parentNode.replaceChild(newField, field);

            const newCrosshair = newField.querySelector('#crosshair');

            newField.addEventListener('mousemove', function(e) {
                const rect = this.getBoundingClientRect();
                newCrosshair.style.left = (e.clientX - rect.left) + 'px';
                newCrosshair.style.top = (e.clientY - rect.top) + 'px';
                newCrosshair.style.display = 'block';
            });

            newField.addEventListener('mouseleave', function() {
                newCrosshair.style.display = 'none';
            });

            newField.addEventListener('click', function(e) {
                if (e.target === this || e.target.classList.contains('crosshair')) {
                    if (state.hunt.isPlaying && !state.hunt.isGameOver) {
                        sound.playMiss();
                        const shot = document.createElement('div');
                        shot.className = 'shot-effect';
                        shot.textContent = '·';
                        shot.style.color = '#00ff41';
                        shot.style.fontSize = '20px';
                        shot.style.opacity = '0.3';
                        shot.style.left = (e.clientX - this.getBoundingClientRect().left) + 'px';
                        shot.style.top = (e.clientY - this.getBoundingClientRect().top) + 'px';
                        this.appendChild(shot);
                        setTimeout(() => shot.remove(), 200);
                    }
                }
            });

            newField.addEventListener('click', function(e) {
                const mutant = e.target.closest('.mutant');
                if (mutant && !mutant.classList.contains('hit')) {
                    sound.playShoot();
                }
            });
        }

        function spawnMutant() {
            const hunt = state.hunt;
            if (hunt.isGameOver || !hunt.isPlaying) return;

            const field = document.getElementById('huntingField');
            const currentMutants = field.querySelectorAll('.mutant');

            if (currentMutants.length >= CONFIG.MAX_MUTANTS) return;

            const mutantData = CONFIG.MUTANTS[Math.floor(Math.random() * CONFIG.MUTANTS.length)];
            const size = Math.random() * 20 + 36;

            const mutant = document.createElement('div');
            mutant.className = 'mutant';
            mutant.textContent = mutantData.emoji;
            mutant.style.fontSize = size + 'px';
            mutant.style.left = (Math.random() * 85 + 5) + '%';
            mutant.style.top = (Math.random() * 80 + 5) + '%';
            mutant.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            mutant.dataset.name = mutantData.name;

            const label = document.createElement('span');
            label.className = 'mutant-label';
            label.textContent = mutantData.name;
            mutant.appendChild(label);

            mutant.addEventListener('click', function(e) {
                if (state.hunt.isGameOver || !state.hunt.isPlaying) return;
                e.stopPropagation();
                shootMutant(this);
            });

            const speedX = (Math.random() - 0.5) * 0.5;
            const speedY = (Math.random() - 0.5) * 0.5;

            let x = parseFloat(mutant.style.left);
            let y = parseFloat(mutant.style.top);

            const moveInterval = setInterval(() => {
                if (state.hunt.isGameOver || !state.hunt.isPlaying || !mutant.parentNode) {
                    clearInterval(moveInterval);
                    return;
                }

                x += speedX * 0.3;
                y += speedY * 0.3;

                if (x < 2 || x > 90) {
                    x = Math.max(2, Math.min(90, x));
                }
                if (y < 2 || y > 90) {
                    y = Math.max(2, Math.min(90, y));
                }

                mutant.style.left = x + '%';
                mutant.style.top = y + '%';
            }, 100);

            mutant._moveInterval = moveInterval;

            field.appendChild(mutant);
            hunt.mutants.push(mutant);

            setTimeout(() => {
                if (mutant.parentNode && !mutant.classList.contains('hit')) {
                    mutant.style.opacity = '0.3';
                    setTimeout(() => {
                        if (mutant.parentNode) {
                            if (mutant._moveInterval) clearInterval(mutant._moveInterval);
                            mutant.remove();
                        }
                    }, 500);
                }
            }, 5000);
        }

        function shootMutant(mutant) {
            const hunt = state.hunt;
            if (hunt.isGameOver || !hunt.isPlaying) return;
            if (mutant.classList.contains('hit')) return;

            sound.playHit();

            mutant.classList.add('hit');

            if (mutant._moveInterval) {
                clearInterval(mutant._moveInterval);
            }

            const field = document.getElementById('huntingField');
            const rect = mutant.getBoundingClientRect();
            const fieldRect = field.getBoundingClientRect();

            const shot = document.createElement('div');
            shot.className = 'shot-effect';
            shot.textContent = '💥';
            shot.style.left = (rect.left - fieldRect.left + rect.width / 2) + 'px';
            shot.style.top = (rect.top - fieldRect.top + rect.height / 2) + 'px';
            field.appendChild(shot);

            setTimeout(() => {
                shot.classList.add('active');
                setTimeout(() => shot.remove(), 300);
            }, 10);

            hunt.score++;
            document.getElementById('huntScore').textContent = hunt.score;

            if (hunt.score >= CONFIG.TARGET_KILLS) {
                endHunt(true);
                return;
            }

            document.getElementById('huntTarget').textContent = `${hunt.score}/${CONFIG.TARGET_KILLS}`;

            setTimeout(() => {
                if (mutant.parentNode) {
                    mutant.remove();
                }
            }, 300);
        }

        function endHunt(win) {
            const hunt = state.hunt;
            if (hunt.isGameOver) return;
            hunt.isGameOver = true;
            hunt.isPlaying = false;
            hunt.isWin = win;

            if (hunt.spawnInterval) clearInterval(hunt.spawnInterval);
            if (hunt.timerInterval) clearInterval(hunt.timerInterval);

            const field = document.getElementById('huntingField');
            field.querySelectorAll('.mutant').forEach(m => {
                if (m._moveInterval) clearInterval(m._moveInterval);
                m.remove();
            });

            sound.playGameOver(win);

            const msg = document.getElementById('huntMessage');

            if (win || hunt.score >= CONFIG.TARGET_KILLS) {
                msg.textContent = '🎉 ПОБЕДА! Все мутанты уничтожены!';
                msg.className = 'message success';
                state.stage = 1;
                saveState();
                setTimeout(() => showGame('sudoku'), 1500);
            } else {
                msg.textContent = `❌ Время вышло! Уничтожено: ${hunt.score}/${CONFIG.TARGET_KILLS}`;

                state.attempts++;
                saveState();
                if (state.attempts >= CONFIG.MAX_ATTEMPTS) {
                    setTimeout(() => showScreamer(), 1000);
                } else {
                    setTimeout(() => showGame('hunt'), 1500);
                }
            }
        }

                    if (val !== 0) {
                        cell.textContent = val;
                        cell.classList.add('fixed');
                    } else {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.maxLength = 1;
                        input.dataset.x = x;
                        input.dataset.y = y;
                        input.addEventListener('input', function() {
                            const v = this.value.trim();
                            if (v && !/^[1-9]$/.test(v)) {
                                this.value = '';
                                return;
                            }
                            if (v) {
                                state.sudokuGrid[y][x] = parseInt(v);
                                saveState();
                            } else {
                                state.sudokuGrid[y][x] = 0;
                                saveState();
                            }
                        });
                        cell.appendChild(input);
                    }
                    gridDiv.appendChild(cell);
                }
            }

            sudokuSection.appendChild(gridDiv);
            wrapper.appendChild(sudokuSection);

            const puzzleSection = document.createElement('div');
            puzzleSection.className = 'puzzle-section';

            const simonGrid = document.createElement('div');
            simonGrid.className = 'simon-grid';
            simonGrid.id = 'simonGrid';

            const cells = [];
            for (let i = 0; i < 6; i++) {
                const cell = document.createElement('div');
                cell.className = 'simon-cell';
                cell.dataset.index = i;
                if (i === 2) {
                    cell.classList.add('center');
                    cell.textContent = '★';
                    cell.title = 'Нажмите для старта';
                }
                simonGrid.appendChild(cell);
                cells.push(cell);
            }
            puzzleSection.appendChild(simonGrid);

            const passwordInput = document.createElement('input');
            passwordInput.className = 'puzzle-password-input';
            passwordInput.id = 'puzzlePasswordInput';
            passwordInput.type = 'text';
            passwordInput.maxLength = 4;
            passwordInput.placeholder = 'Пароль: ____';
            passwordInput.autocomplete = 'off';
            puzzleSection.appendChild(passwordInput);

            wrapper.appendChild(puzzleSection);
            container.appendChild(wrapper);

            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            const checkBtn = createBtn('Проверить', () => checkSudoku());
            const resetBtn = createBtn('Сброс', () => {
                state.sudokuGrid = CONFIG.SUDOKU_PUZZLE.map(row => [...row]);
                state.sudokuSkipped = false;
                saveState();
                showGame('sudoku');
            });

            btnGroup.appendChild(checkBtn);
            btnGroup.appendChild(resetBtn);
            container.appendChild(btnGroup);

            content.appendChild(container);

            initSimonGame(cells, passwordInput);
        }

        function initSimonGame(cells, passwordInput) {
            simonState = {
                cells: cells,
                passwordInput: passwordInput,
                isPlaying: false,
                isShowing: false,
                sequence: [],
                playerSequence: [],
                currentLevel: 0,
                maxLevels: 5,
                isWaitingForInput: false,
                isComplete: state.simon.isComplete || false
            };

            if (state.simon.isComplete) {
                simonState.isComplete = true;
                passwordInput.classList.add('show');
                passwordInput.disabled = false;
                passwordInput.focus();
                cells.forEach(c => c.classList.add('disabled'));
                cells[2].classList.remove('center');
                cells[2].textContent = '✅';
                cells[2].classList.add('disabled');
            } else if (state.simon.level > 0) {
                simonState.currentLevel = state.simon.level;
                cells[2].textContent = '★';
                cells[2].classList.remove('disabled');
                cells.forEach((c, i) => {
                    if (i !== 2) c.classList.add('disabled');
                });
                if (state.simon.sequence && state.simon.sequence.length > 0) {
                    simonState.sequence = state.simon.sequence;
                    if (state.simon.playerSequence && state.simon.playerSequence.length === simonState.sequence.length) {
                        setTimeout(() => simonNextLevel(), 500);
                    } else {
                        cells[2].textContent = '▶';
                        setTimeout(() => simonShowSequence(), 500);
                    }
                }
            } else {
                cells.forEach((c, i) => {
                    if (i !== 2) c.classList.add('disabled');
                });
                cells[2].textContent = '★';
                cells[2].classList.remove('disabled');
            }

            cells[2].addEventListener('click', function() {
                if (simonState.isComplete) return;
                if (simonState.isPlaying || simonState.isShowing) return;

                if (simonState.currentLevel === 0) {
                    simonStartGame();
                } else if (simonState.sequence.length > 0 && !simonState.isWaitingForInput) {
                    this.textContent = '▶';
                    setTimeout(() => simonShowSequence(), 300);
                } else {
                    simonStartGame();
                }
            });

            cells.forEach((cell, index) => {
                if (index === 2) return;
                cell.addEventListener('click', function() {
                    if (!simonState.isWaitingForInput || simonState.isShowing || simonState.isComplete) return;
                    simonHandleClick(index);
                });
            });

            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const code = this.value.trim();
                    if (code === CONFIG.SUDOKU_SKIP_PASSWORD) {
                        state.sudokuSkipped = true;
                        state.simon.isComplete = true;
                        saveState();
                        showMessage('✅ Пароль принят! Судоку разблокировано.', 'success');
                        state.sudokuGrid = CONFIG.SUDOKU_SOLUTION.map(row => [...row]);
                        saveState();
                        setTimeout(() => {
                            state.stage = 2;
                            saveState();
                            showGame('stupid');
                        }, 1500);
                    } else if (code.length === 4) {
                        state.attempts++;
                        saveState();
                        if (state.attempts >= CONFIG.MAX_ATTEMPTS) {
                            showScreamer();
                            return;
                        }
                        showMessage(`❌ Неверный пароль! Осталось попыток: ${CONFIG.MAX_ATTEMPTS - state.attempts}`, 'error');
                        updateAttempts();
                        this.value = '';
                        this.focus();
                    } else if (code.length > 0) {
                        showMessage('⚠️ Введите 4-значный код', 'error');
                        this.value = '';
                        this.focus();
                    }
                }
            });
        }

        function simonStartGame() {
            if (simonState.isComplete) return;
            simonState.isPlaying = true;
            simonState.currentLevel = 0;
            simonState.sequence = [];
            simonState.playerSequence = [];

            state.simon.level = 0;
            state.simon.sequence = [];
            state.simon.playerSequence = [];
            saveState();

            simonState.cells.forEach((c, i) => {
                if (i !== 2) c.classList.remove('disabled');
                c.classList.remove('active', 'wrong');
            });
            simonState.cells[2].textContent = '▶';
            simonState.cells[2].classList.remove('disabled');

            simonNextLevel();
        }

        function simonNextLevel() {
            if (simonState.currentLevel >= simonState.maxLevels) {
                simonState.isComplete = true;
                state.simon.isComplete = true;
                saveState();
                simonState.cells.forEach(c => c.classList.add('disabled'));
                simonState.cells[2].textContent = '✅';
                simonState.cells[2].classList.add('disabled');
                simonState.passwordInput.classList.add('show');
                simonState.passwordInput.disabled = false;
                simonState.passwordInput.focus();
                return;
            }

            simonState.currentLevel++;
            state.simon.level = simonState.currentLevel;
            saveState();

            const seqLength = CONFIG.SIMON_LEVELS[simonState.currentLevel - 1] || 3;
            simonState.sequence = [];
            for (let i = 0; i < seqLength; i++) {
                let idx;
                do {
                    idx = Math.floor(Math.random() * 6);
                } while (idx === 2);
                simonState.sequence.push(idx);
            }

            state.simon.sequence = simonState.sequence;
            state.simon.playerSequence = [];
            saveState();

            simonState.playerSequence = [];
            simonState.isWaitingForInput = false;
            simonState.cells[2].textContent = '▶';
            setTimeout(() => simonShowSequence(), 500);
        }

        function simonShowSequence() {
            simonState.isShowing = true;
            simonState.isWaitingForInput = false;
            simonState.cells[2].textContent = '⏳';

            let i = 0;
            const interval = setInterval(() => {
                if (i >= simonState.sequence.length) {
                    clearInterval(interval);
                    simonState.isShowing = false;
                    simonState.isWaitingForInput = true;
                    simonState.playerSequence = [];
                    simonState.cells[2].textContent = '✏️';
                    return;
                }

                const idx = simonState.sequence[i];
                const cell = simonState.cells[idx];
                cell.classList.add('active');
                setTimeout(() => {
                    cell.classList.remove('active');
                }, 400);
                i++;
            }, 600);
        }

        function simonHandleClick(index) {
            if (!simonState.isWaitingForInput || simonState.isShowing) return;
            if (index === 2) return;

            const cell = simonState.cells[index];
            const expectedIndex = simonState.sequence[simonState.playerSequence.length];

            cell.classList.add('active');
            setTimeout(() => cell.classList.remove('active'), 300);

            if (index === expectedIndex) {
                simonState.playerSequence.push(index);
                state.simon.playerSequence = simonState.playerSequence;
                saveState();

                if (simonState.playerSequence.length === simonState.sequence.length) {
                    simonState.isWaitingForInput = false;
                    simonState.cells[2].textContent = '✅';
                    state.simon.level = simonState.currentLevel;
                    saveState();

                    setTimeout(() => {
                        simonState.cells[2].textContent = '▶';
                        simonNextLevel();
                    }, 800);
                }
            } else {
                cell.classList.add('wrong');
                setTimeout(() => cell.classList.remove('wrong'), 500);

                state.attempts++;
                saveState();
                if (state.attempts >= CONFIG.MAX_ATTEMPTS) {
                    showScreamer();
                    return;
                }
                updateAttempts();

                simonState.playerSequence = [];
                state.simon.playerSequence = [];
                saveState();
                simonState.isWaitingForInput = false;

                setTimeout(() => {
                    simonState.cells[2].textContent = '▶';
                    setTimeout(() => simonShowSequence(), 500);
                }, 1000);
            }
        }

        function checkSudoku() {
            if (state.gameOver || state.gameWon) return;

            if (state.sudokuSkipped) {
                state.stage = 2;
                saveState();
                showMessage('✅ Судоку уже разблокировано!', 'success');
                setTimeout(() => showGame('stupid'), 1000);
                return;
            }

            for (let y = 0; y < 9; y++) {
                for (let x = 0; x < 9; x++) {
                    const val = state.sudokuGrid[y][x];
                    if (val !== CONFIG.SUDOKU_SOLUTION[y][x]) {
                        state.attempts++;
                        saveState();
                        if (state.attempts >= CONFIG.MAX_ATTEMPTS) {
                            showScreamer();
                            return;
                        }
                        showMessage(`❌ Неправильно! Осталось попыток: ${CONFIG.MAX_ATTEMPTS - state.attempts}`, 'error');
                        updateAttempts();
                        return;
                    }
                }
            }

            state.stage = 2;
            saveState();
            showMessage('✅ Судоку решено!', 'success');
            setTimeout(() => showGame('stupid'), 1000);
        }

        // ========================================
        // ===== ГЛУПЫЕ ВОПРОСЫ =====
        // ========================================

        function showStupidQuestions(content) {
            const container = document.createElement('div');
            container.className = 'game-container active';

            const title = document.createElement('div');
            title.className = 'game-title';
            title.textContent = '══ ОПРОС ══';
            container.appendChild(title);

            const desc = document.createElement('div');
            desc.className = 'message';
            desc.textContent = 'Ответьте на вопросы. На ответы можно отвечать как угодно!';
            container.appendChild(desc);

            const q = CONFIG.STUPID_QUESTIONS[state.stupidIndex];
            if (!q) {
                state.stage = 3;
                saveState();

                const msg = document.createElement('div');
                msg.className = 'message success';
                msg.textContent = 'Мне требовалось время, чтобы подгрузить основные данные, поэтому я увлекал тебя рядом глупых вопросов, на которые можно было отвечать как угодно.';
                container.appendChild(msg);

                const nextBtn = createBtn('Продолжить →', () => {
                    showGame('final');
                });
                container.appendChild(nextBtn);

                content.appendChild(container);
                return;
            }

            const questionDiv = document.createElement('div');
            questionDiv.className = 'message';
            questionDiv.textContent = q;
            questionDiv.style.marginTop = '20px';
            container.appendChild(questionDiv);

            const input = document.createElement('input');
            input.className = 'input-field';
            input.id = 'stupidInput';
            input.placeholder = 'Ваш ответ...';
            container.appendChild(input);

            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            const answerBtn = createBtn('Ответить', () => {
                const answer = document.getElementById('stupidInput').value.trim();
                if (answer) {
                    state.stupidIndex++;
                    saveState();
                    showMessage('✅ Принято!', 'success');
                    setTimeout(() => showGame('stupid'), 500);
                } else {
                    showMessage('Напишите хоть что-нибудь!', 'error');
                }
            });

            btnGroup.appendChild(answerBtn);
            container.appendChild(btnGroup);

            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') answerBtn.click();
            });

            content.appendChild(container);
        }

        // ========================================
        // ===== ФИНАЛЬНЫЕ ВОПРОСЫ =====
        // ========================================

        function showFinalQuestions(content) {
            const container = document.createElement('div');
            container.className = 'game-container active';

            const title = document.createElement('div');
            title.className = 'game-title';
            title.textContent = '══ ВЕРИФИКАЦИЯ ══';
            container.appendChild(title);

            const desc = document.createElement('div');
            desc.className = 'message';
            desc.textContent = 'Введите правильные ответы для доступа к данным.';
            container.appendChild(desc);

            const questions = CONFIG.FINAL_QUESTIONS;
            const blocks = [];

            questions.forEach((q, index) => {
                const block = document.createElement('div');
                block.className = 'question-block';
                block.id = `qblock_${index}`;

                if (!state.finalUnlocked[index]) {
                    block.classList.add('locked');
                }

                const qText = document.createElement('div');
                qText.className = 'q-text';
                qText.textContent = `${index + 1}. ${q.question}`;
                block.appendChild(qText);

                const input = document.createElement('input');
                input.className = 'q-input';
                input.id = `qinput_${index}`;
                input.placeholder = q.placeholder;
                input.disabled = !state.finalUnlocked[index];

                if (state.finalAnswers[index]) {
                    input.value = state.finalAnswers[index];
                }

                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        checkFinalAnswer(index);
                    }
                });

                input.addEventListener('input', function() {
                    state.finalAnswers[index] = this.value;
                    saveState();
                });

                block.appendChild(input);

                const status = document.createElement('div');
                status.className = 'q-status';
                status.id = `qstatus_${index}`;
                if (state.finalAnswers[index] && state.finalAnswers[index].toUpperCase() === q.answer.toUpperCase()) {
                    status.textContent = '✅ Правильно!';
                    status.classList.add('done');
                } else if (state.finalAnswers[index]) {
                    status.textContent = '⏳ Ожидает проверки...';
                } else {
                    status.textContent = '⏳ Ожидает ввода...';
                }
                block.appendChild(status);

                container.appendChild(block);
                blocks.push(block);
            });

            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            const checkBtn = createBtn('Проверить все', () => {
                let allCorrect = true;
                let firstError = -1;

                CONFIG.FINAL_QUESTIONS.forEach((q, index) => {
                    const input = document.getElementById(`qinput_${index}`);
                    const status = document.getElementById(`qstatus_${index}`);
                    const answer = input.value.trim();
                    state.finalAnswers[index] = answer;

                    if (answer.toUpperCase() === q.answer.toUpperCase()) {
                        status.textContent = '✅ Правильно!';
                        status.classList.add('done');
                        if (index < CONFIG.FINAL_QUESTIONS.length - 1) {
                            state.finalUnlocked[index + 1] = true;
                            const nextInput = document.getElementById(`qinput_${index + 1}`);
                            if (nextInput) {
                                nextInput.disabled = false;
                                document.getElementById(`qblock_${index + 1}`).classList.remove('locked');
                            }
                        }
                    } else {
                        allCorrect = false;
                        if (firstError === -1) firstError = index;
                        status.textContent = '❌ Неправильно!';
                        status.classList.remove('done');
                    }
                });

                saveState();

                if (allCorrect) {
                    state.stage = 4;
                    state.gameWon = true;
                    saveState();
                    showMessage('✅ Ты справился, коллега.', 'success');
                    setTimeout(() => showGame('reward'), 1500);
                } else {
                    state.attempts++;
                    saveState();
                    if (state.attempts >= CONFIG.MAX_ATTEMPTS) {
                        showScreamer();
                        return;
                    }
                    showMessage(`❌ Есть ошибки! Осталось попыток: ${CONFIG.MAX_ATTEMPTS - state.attempts}`, 'error');
                    updateAttempts();

                    if (firstError !== -1) {
                        const input = document.getElementById(`qinput_${firstError}`);
                        if (input) input.focus();
                    }
                }
            });

            btnGroup.appendChild(checkBtn);
            container.appendChild(btnGroup);

            content.appendChild(container);

            for (let i = 0; i < CONFIG.FINAL_QUESTIONS.length; i++) {
                if (state.finalUnlocked[i]) {
                    const input = document.getElementById(`qinput_${i}`);
                    if (input && !input.disabled) {
                        input.focus();
                        break;
                    }
                }
            }
        }

        function checkFinalAnswer(index) {
            const input = document.getElementById(`qinput_${index}`);
            const status = document.getElementById(`qstatus_${index}`);
            const answer = input.value.trim();
            const q = CONFIG.FINAL_QUESTIONS[index];

            state.finalAnswers[index] = answer;
            saveState();

            if (answer.toUpperCase() === q.answer.toUpperCase()) {
                status.textContent = '✅ Правильно!';
                status.classList.add('done');

                if (index < CONFIG.FINAL_QUESTIONS.length - 1) {
                    state.finalUnlocked[index + 1] = true;
                    const nextInput = document.getElementById(`qinput_${index + 1}`);
                    if (nextInput) {
                        nextInput.disabled = false;
                        document.getElementById(`qblock_${index + 1}`).classList.remove('locked');
                        setTimeout(() => nextInput.focus(), 300);
                    }
                }
                saveState();
            } else {
                status.textContent = '❌ Неправильно!';
                status.classList.remove('done');
                state.attempts++;
                saveState();
                if (state.attempts >= CONFIG.MAX_ATTEMPTS) {
                    showScreamer();
                    return;
                }
                showMessage(`❌ Неправильно! Осталось попыток: ${CONFIG.MAX_ATTEMPTS - state.attempts}`, 'error');
                updateAttempts();
                input.value = '';
                input.focus();
            }
        }

        // ========================================
        // ===== ЗАПУСК =====
        // ========================================

        document.addEventListener('DOMContentLoaded', function() {
            const saved = localStorage.getItem('stalkerQuestState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                    if (state.gameWon) {
                        showFinalDialog();
                        return;
                    }
                    if (state.gameOver) {
                        showGameOver();
                        return;
                    }
                } catch (e) {}
            }

            state.sudokuGrid = CONFIG.SUDOKU_PUZZLE.map(row => [...row]);
            state.simon = { level: 0, sequence: [], playerSequence: [], isComplete: false };
            bootSequence();
        });
    </script>
</body>
</html>
